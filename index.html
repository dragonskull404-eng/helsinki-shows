<!DOCTYPE html>
<html>
<head>
  <title>Helsinki Shows</title>

  <style>
 .flyer-container {
      position: relative;
      display: inline-block;
    }

    .flyer-date {
.flyer-date {
  position: absolute;
  top: 20px;            /* moves it closer to top of flyer */
  left: 5px;           /* moves it slightly inside left edge */
  font-size: 15px;      /* smaller font */
  font-weight: 900;     /* still bold/fat */
  font-family: Arial, sans-serif;
  background-color: rgba(255,255,255,0.7);
  padding: 2px 6px;     /* smaller padding */
  border-radius: 3px;   /* smaller corner rounding */
}

    .flyer-info {
      margin-top: 5px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;     
      font-family: Arial, sans-serif;
    }
    body {
      font-family: Arial;
      background: white;
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .shows {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .show img {
      width: 100%;
      border: 1px solid black;
    }

    .show p {
      margin: 5px 0;
    }

    .announcements {
      border: 1px solid black;
      padding: 10px;
      margin-bottom: 20px;
    }

  </style>
</head>

<body>

<h1>HELSINKI SHOWS</h1>

<div class="announcements">
<h2>Announcements</h2>
<p>New demo from LOCAL BAND</p>
<p>New venue opening soon</p>
</div>

<div class="shows">

<div class="show">
  <div class="flyer-container">
    <span class="flyer-date">June 14</span>
    <img src="flyer1.jpg">
  </div>
  <p class="flyer-info">Nuoruus, Airuet, AkDK // KUUDES LINJA</p>
</div>

<div class="show">
  <div class="flyer-container">
    <span class="flyer-date">June 18</span>
    <img src="flyer2.jpg">
  </div>
  <p class="flyer-info">Alas, Videonauhat, soma konna // LEPAKKOMIES</p>
</div>

</div>

</body>
</html>

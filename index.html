<!DOCTYPE html>
<html>
<head>
  <title>Helsinki Shows</title>

  <style>

    body {
      font-family: Arial;
      background: white;
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .shows {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .show img {
      width: 100%;
      border: 1px solid black;
    }

    .show p {
      margin: 5px 0;
    }

    .announcements {
      border: 1px solid black;
      padding: 10px;
      margin-bottom: 20px;
    }

  </style>
</head>

<body>

<h1>HELSINKI SHOWS</h1>

<div class="announcements">
<h2>Announcements</h2>
<p>New demo from LOCAL BAND</p>
<p>New venue opening soon</p>
</div>

<div class="shows">

<div class="show">
<img src="flyer1.jpg">
<p>June 14 – Kuudes Linja</p>
</div>

<div class="show">
<img src="flyer2.jpg">
<p>June 18 – DIY Space</p>
</div>

</div>

</body>
</html>
